<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Talon Studio</title>
<style>
  /* ── Design Tokens ───────────────────────────────────────────── */
  :root{
    --bg:#0a0b0d; --panel:#131519; --panel2:#1a1d22; --panel3:#21252c;
    --line:#23272e; --line2:#2d323a;
    --fg:#e8eaed; --fg2:#c9cdd4; --muted:#8b92a0;
    --accent:#bfa669; --accent2:#7fd0ff; --accent3:#a890ff;
    --danger:#ff6b6b; --ok:#4ade80; --warn:#fbbf24;
    --track1:#8B5E3C; --track2:#6B4E7B; --track3:#4E7B6B;
    --track4:#7B6B4E; --track5:#3B6B8B; --track6:#8B3B6B;
    --track7:#6B8B3B; --track8:#5C5C5C;
    --gold:#bfa669;
    font-size:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
    font-family:-apple-system,system-ui,"Inter",sans-serif;
    font-feature-settings:"ss01","cv11";}
  body{line-height:1.45;overflow:hidden;}

  /* ── Layout ──────────────────────────────────────────────────── */
  .app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:56px 1fr;height:100vh;}
  header{grid-column:1/-1;display:flex;align-items:center;padding:0 22px;
    border-bottom:1px solid var(--line);background:var(--panel);}
  header h1{margin:0;font-size:15px;font-weight:600;letter-spacing:.02em;}
  header .mark{width:24px;height:24px;margin-right:12px;border-radius:4px;
    background:linear-gradient(135deg,var(--gold),#8a7a4f);display:flex;
    align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--bg);}
  header .spacer{flex:1;}
  header .meta{color:var(--muted);font-size:12px;display:flex;gap:16px;align-items:center;}
  header .status-pulse{width:8px;height:8px;border-radius:50%;background:var(--ok);
    box-shadow:0 0 10px var(--ok);animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}

  aside{background:var(--panel);overflow-y:auto;border-right:1px solid var(--line);
    padding:16px 0;display:flex;flex-direction:column;}
  main{overflow-y:auto;padding:22px;background:var(--bg);}

  /* ── Track List ──────────────────────────────────────────────── */
  .track-list{flex:1;}
  .track-item{padding:10px 16px;margin:0 8px;border-radius:8px;cursor:pointer;
    transition:all .12s;display:flex;align-items:center;gap:10px;
    border:1px solid transparent;}
  .track-item:hover{background:var(--panel2);border-color:var(--line);}
  .track-item.active{background:var(--panel3);border-color:var(--gold);}
  .track-item .num{width:24px;height:24px;border-radius:6px;display:flex;
    align-items:center;justify-content:center;font-size:11px;font-weight:700;}
  .track-item .info{flex:1;min-width:0;}
  .track-item .title{font-weight:600;font-size:13px;}
  .track-item .subtitle{font-size:11px;color:var(--muted);margin-top:1px;}
  .track-item .badge{width:8px;height:8px;border-radius:50%;}
  .track-item .badge.rendered{background:var(--ok);box-shadow:0 0 6px var(--ok);}
  .track-item .badge.unrendered{background:var(--muted);}
  .track-item .badge.error{background:var(--danger);}

  /* ── Album Overview ──────────────────────────────────────────── */
  .album-bar{padding:12px 16px;border-top:1px solid var(--line);}
  .album-bar h3{margin:0 0 8px;font-size:11px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--muted);font-weight:600;}
  .progress-ring{width:48px;height:48px;}
  .progress-ring circle{fill:none;stroke-width:3;}
  .progress-ring .bg{stroke:var(--line);}
  .progress-ring .fill{stroke:var(--gold);stroke-linecap:round;
    transition:stroke-dashoffset .6s ease;}
  .album-stats{display:flex;align-items:center;gap:14px;}
  .album-stats .pct{font-size:18px;font-weight:700;color:var(--gold);}
  .album-stats .label{font-size:11px;color:var(--muted);}
  .render-all-btn{margin-top:10px;width:100%;}

  /* ── Main Content Cards ──────────────────────────────────────── */
  .section-title{margin:0 0 14px;font-size:11px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--muted);font-weight:600;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:18px;margin-bottom:14px;}
  .card .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .card .card-title{font-size:16px;font-weight:600;}
  .card .card-subtitle{font-size:12px;color:var(--muted);margin-top:2px;}
  .card .card-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
  .meta-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
    background:var(--panel2);border:1px solid var(--line);border-radius:6px;font-size:11px;}
  .meta-chip .key{color:var(--muted);}
  .meta-chip .val{color:var(--fg2);font-weight:600;}

  /* ── Actions ─────────────────────────────────────────────────── */
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  button{font:inherit;cursor:pointer;background:var(--panel2);color:var(--fg);
    border:1px solid var(--line);border-radius:8px;padding:8px 14px;
    font-size:12px;transition:all .12s;display:inline-flex;align-items:center;gap:6px;}
  button:hover{border-color:var(--accent2);color:var(--accent2);}
  button.primary{background:linear-gradient(180deg,#3a3020,#2a2215);
    border-color:var(--gold);color:var(--gold);}
  button.primary:hover{border-color:#d4b87a;box-shadow:0 0 0 3px rgba(191,166,105,.12);}
  button.danger{background:#2d1718;border-color:#4a2628;color:#ffb4b4;}
  button.danger:hover{border-color:var(--danger);color:#ffd7d7;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button .spin{width:12px;height:12px;border:2px solid var(--fg);
    border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;display:none;}
  button.loading .spin{display:inline-block;}
  button.loading .label{opacity:.7;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── Render Grid ─────────────────────────────────────────────── */
  .render-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .render-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px;transition:all .12s;}
  .render-card:hover{border-color:var(--line2);}
  .render-card .track-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .render-card .track-num{font-size:20px;font-weight:700;color:var(--gold);opacity:.6;}
  .render-card .track-status{width:10px;height:10px;border-radius:50%;}
  .render-card .track-status.rendered{background:var(--ok);box-shadow:0 0 8px var(--ok);}
  .render-card .track-status.unrendered{background:var(--muted);}
  .render-card .track-title{font-weight:600;font-size:13px;}
  .render-card .track-desc{font-size:11px;color:var(--muted);margin-top:2px;}
  .render-card .file-info{margin-top:10px;font-size:11px;color:var(--muted);}
  .render-card .file-info .size{color:var(--fg2);font-weight:600;}
  .render-card .card-actions{display:flex;gap:6px;margin-top:10px;}
  .render-card button{padding:6px 10px;font-size:11px;}

  /* ── Vocal Mix Panel ─────────────────────────────────────────── */
  .mix-panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;}
  .mix-panel label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;
    text-transform:uppercase;letter-spacing:.06em;}
  .mix-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  input[type="range"]{flex:1;min-width:120px;height:4px;-webkit-appearance:none;
    background:var(--line2);border-radius:2px;outline:none;}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
    border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 8px rgba(191,166,105,.4);}
  .db-display{font-family:ui-monospace,monospace;font-size:14px;color:var(--gold);min-width:48px;}

  /* ── DNA Panel ───────────────────────────────────────────────── */
  .dna-panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;}
  .dna-content{font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;
    color:var(--fg2);white-space:pre-wrap;max-height:400px;overflow-y:auto;}
  .dna-content h1,.dna-content h2,.dna-content h3{color:var(--gold);margin-top:16px;margin-bottom:8px;}
  .dna-content p{margin:6px 0;}
  .dna-content code{background:var(--panel3);padding:2px 6px;border-radius:4px;font-size:11px;}

  /* ── Toast ───────────────────────────────────────────────────── */
  #toast{position:fixed;bottom:20px;right:20px;max-width:320px;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:12px 16px;opacity:0;transition:opacity .2s,transform .2s;
    pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.6);z-index:100;
    transform:translateY(10px);}
  #toast.show{opacity:1;transform:translateY(0);}
  #toast.ok{border-color:#1c4829;}
  #toast.err{border-color:#4a2628;}
  #toast .t{font-weight:600;margin-bottom:4px;}
  #toast .m{font-size:12px;color:var(--fg2);}

  /* ── Scrollbar ───────────────────────────────────────────────── */
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--line2);}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="mark">S</div>
    <h1>Talon Studio</h1>
    <span class="spacer"></span>
    <div class="meta">
      <span id="renderedCount">0 / 8 rendered</span>
      <span id="totalSize">0 MB</span>
      <span id="lastPoll">polling...</span>
    </div>
  </header>

  <!-- LEFT: Track Navigator + Album Overview -->
  <aside>
    <div class="track-list" id="trackList"></div>
    <div class="album-bar">
      <h3>Album Progress</h3>
      <div class="album-stats">
        <svg class="progress-ring" viewBox="0 0 48 48">
          <circle class="bg" cx="24" cy="24" r="20"/>
          <circle id="progressFill" class="fill" cx="24" cy="24" r="20"
            stroke-dasharray="125.6" stroke-dashoffset="125.6" transform="rotate(-90 24 24)"/>
        </svg>
        <div>
          <div class="pct" id="progressPct">0%</div>
          <div class="label">complete</div>
        </div>
      </div>
      <button class="render-all-btn primary" onclick="renderAlbum()" id="renderAllBtn">
        <span class="spin"></span>
        <span class="label">Render Full Album</span>
      </button>
    </div>
  </aside>

  <!-- MAIN: Track Detail + Controls -->
  <main id="main">
    <div id="trackDetail"></div>

    <h3 class="section-title" style="margin-top:22px;">All Tracks</h3>
    <div class="render-grid" id="renderGrid"></div>

    <h3 class="section-title" style="margin-top:22px;">Vocal Mix</h3>
    <div class="mix-panel" id="mixPanel">
      <label>Track</label>
      <select id="mixTrack" style="width:100%;margin-bottom:12px;padding:8px 10px;
        background:var(--panel2);color:var(--fg);border:1px solid var(--line);border-radius:6px;
        font-size:12px;"></select>
      <label>Vocal Level</label>
      <div class="mix-controls">
        <input type="range" id="mixDb" min="-18" max="0" step="0.5" value="-6" oninput="updateDbDisplay(this.value)"/>
        <span class="db-display" id="dbDisplay">-6.0 dB</span>
      </div>
      <div class="actions" style="margin-top:14px;">
        <button class="primary" onclick="mixVocals()" id="mixBtn">
          <span class="spin"></span><span class="label">Mix Vocals</span>
        </button>
      </div>
    </div>

    <h3 class="section-title" style="margin-top:22px;">DNA Spec</h3>
    <div class="dna-panel" id="dnaPanel">
      <div class="dna-content" id="dnaContent">Loading DNA spec...</div>
    </div>
  </main>
</div>

<div id="toast"><div class="t" id="toastTitle"></div><div class="m" id="toastMsg"></div></div>

<script>
// ── API Base ────────────────────────────────────────────────────
const API = (window.location.pathname.includes('/dashboard'))
  ? '/dashboard/substrate'
  : '/substrate';

let trackData = [];
let statusData = [];
let activeTrack = null;
let pollTimer = null;

// ── Init ────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadTracks(), loadStatus(), loadDNA()]);
  buildTrackList();
  buildRenderGrid();
  buildMixDropdown();
  updateAlbumStats();
  selectTrack(trackData[0]?.slug);
  pollTimer = setInterval(pollStatus, 5000);
}

// ── Data Loading ────────────────────────────────────────────────
async function loadTracks() {
  const r = await fetch(`${API}/tracks`);
  const d = await r.json();
  trackData = d.tracks || [];
}

async function loadStatus() {
  const r = await fetch(`${API}/status`);
  const d = await r.json();
  statusData = d.tracks || [];
}

async function loadDNA() {
  try {
    const r = await fetch(`${API}/dna`);
    const d = await r.json();
    const el = document.getElementById('dnaContent');
    if (d.dna_markdown) {
      el.textContent = d.dna_markdown;
    } else {
      el.textContent = JSON.stringify(d, null, 2);
    }
  } catch(e) {
    document.getElementById('dnaContent').textContent = 'DNA spec unavailable.';
  }
}

async function pollStatus() {
  await loadStatus();
  buildRenderGrid();
  buildTrackList();
  updateAlbumStats();
  document.getElementById('lastPoll').textContent = new Date().toLocaleTimeString();
}

// ── UI Builders ─────────────────────────────────────────────────
function buildTrackList() {
  const el = document.getElementById('trackList');
  el.innerHTML = '';
  trackData.forEach(t => {
    const st = statusData.find(s => s.title === t.title) || {};
    const rendered = st.has_master_wav || st.has_master_mp3;
    const div = document.createElement('div');
    div.className = `track-item ${t.slug === activeTrack ? 'active' : ''}`;
    div.onclick = () => selectTrack(t.slug);
    div.innerHTML = `
      <div class="num" style="background:var(--track${t.track_number}20);color:var(--track${t.track_number})">${t.track_number}</div>
      <div class="info">
        <div class="title">${t.title}</div>
        <div class="subtitle">${t.key} · ${t.bpm} BPM · ${t.duration}</div>
      </div>
      <div class="badge ${rendered ? 'rendered' : 'unrendered'}"></div>
    `;
    el.appendChild(div);
  });
}

function buildRenderGrid() {
  const el = document.getElementById('renderGrid');
  el.innerHTML = '';
  trackData.forEach(t => {
    const st = statusData.find(s => s.title === t.title) || {};
    const rendered = st.has_master_wav || st.has_master_mp3;
    const card = document.createElement('div');
    card.className = 'render-card';
    card.innerHTML = `
      <div class="track-header">
        <div class="track-num">${String(t.track_number).padStart(2,'0')}</div>
        <div class="track-status ${rendered ? 'rendered' : 'unrendered'}"></div>
      </div>
      <div class="track-title">${t.title}</div>
      <div class="track-desc">${t.character}</div>
      <div class="file-info">
        ${rendered
          ? `<span class="size">${st.master_size_mb || 0} MB WAV</span> · ${st.stem_count || 0} stems`
          : '<span>Not rendered</span>'}
      </div>
      <div class="card-actions">
        <button onclick="renderTrack('${t.slug}')" ${rendered ? '' : 'class="primary"'} id="btn-render-${t.slug}">
          <span class="spin"></span><span class="label">${rendered ? 'Re-render' : 'Render'}</span>
        </button>
        ${rendered ? `<button onclick="openTrack('${t.slug}')">Open</button>` : ''}
      </div>
    `;
    el.appendChild(card);
  });
}

function buildMixDropdown() {
  const el = document.getElementById('mixTrack');
  el.innerHTML = trackData.map(t =>
    `<option value="${t.slug}">${t.track_number}. ${t.title}</option>`
  ).join('');
}

function updateAlbumStats() {
  const rendered = statusData.filter(s => s.has_master_wav || s.has_master_mp3).length;
  const total = trackData.length;
  const totalMb = statusData.reduce((a, s) => a + (s.master_size_mb || 0), 0);
  const pct = total ? Math.round((rendered / total) * 100) : 0;

  document.getElementById('renderedCount').textContent = `${rendered} / ${total} rendered`;
  document.getElementById('totalSize').textContent = `${Math.round(totalMb)} MB`;
  document.getElementById('progressPct').textContent = `${pct}%`;

  const circle = document.getElementById('progressFill');
  const circumference = 2 * Math.PI * 20;
  const offset = circumference - (pct / 100) * circumference;
  circle.style.strokeDashoffset = offset;
}

function selectTrack(slug) {
  activeTrack = slug;
  const t = trackData.find(x => x.slug === slug);
  if (!t) return;
  buildTrackList();

  const st = statusData.find(s => s.title === t.title) || {};
  const rendered = st.has_master_wav || st.has_master_mp3;

  document.getElementById('trackDetail').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${t.title}</div>
          <div class="card-subtitle">${t.character}</div>
          <div class="card-meta">
            <div class="meta-chip"><span class="key">Key</span> <span class="val">${t.key}</span></div>
            <div class="meta-chip"><span class="key">BPM</span> <span class="val">${t.bpm}</span></div>
            <div class="meta-chip"><span class="key">Duration</span> <span class="val">${t.duration}</span></div>
            <div class="meta-chip"><span class="key">Instruments</span> <span class="val">${t.instruments}</span></div>
            <div class="meta-chip"><span class="key">Builder</span> <span class="val">${t.builder_lines} lines</span></div>
            <div class="meta-chip"><span class="key">Status</span> <span class="val" style="color:${rendered ? 'var(--ok)' : 'var(--muted)'}">${rendered ? 'Rendered' : 'Unrendered'}</span></div>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="primary" onclick="renderTrack('${t.slug}')" id="btn-detail-render-${t.slug}">
          <span class="spin"></span><span class="label">${rendered ? 'Re-render' : 'Render'}</span>
        </button>
        ${rendered ? `<button onclick="openTrack('${t.slug}')">Open Audio Player</button>` : ''}
        ${rendered ? `<button onclick="document.getElementById('mixTrack').value='${t.slug}';document.getElementById('mixTrack').scrollIntoView({behavior:'smooth'})">Go to Mix</button>` : ''}
      </div>
      ${rendered ? `
      <div style="margin-top:14px;font-size:11px;color:var(--muted);">
        Master WAV: ${st.master_size_mb || 0} MB · MP3: ${st.mp3_size_mb || 0} MB · Stems: ${st.stem_count || 0}
      </div>` : ''}
    </div>
  `;
}

function updateDbDisplay(v) {
  document.getElementById('dbDisplay').textContent = parseFloat(v).toFixed(1) + ' dB';
}

// ── Actions ─────────────────────────────────────────────────────
async function renderTrack(slug) {
  setLoading(`btn-render-${slug}`, true);
  setLoading(`btn-detail-render-${slug}`, true);
  try {
    const r = await fetch(`${API}/render/${slug}?instrumental=true`, {method: 'POST'});
    const d = await r.json();
    if (d.status === 'success') {
      toast('Render Complete', `${d.track} rendered in ${d.elapsed_seconds}s`);
    } else {
      toast('Render Failed', d.error || d.stderr?.slice(0,200) || 'Unknown error', true);
    }
    await pollStatus();
  } catch(e) {
    toast('Error', e.message, true);
  } finally {
    setLoading(`btn-render-${slug}`, false);
    setLoading(`btn-detail-render-${slug}`, false);
  }
}

async function renderAlbum() {
  setLoading('renderAllBtn', true);
  try {
    const r = await fetch(`${API}/render-album?instrumental=true`, {method: 'POST'});
    const d = await r.json();
    const ok = d.tracks?.filter(t => t.status === 'success').length || 0;
    toast('Album Render Complete', `${ok}/${d.tracks?.length || 0} tracks rendered in ${d.total_elapsed_seconds}s`);
    await pollStatus();
  } catch(e) {
    toast('Error', e.message, true);
  } finally {
    setLoading('renderAllBtn', false);
  }
}

async function mixVocals() {
  const track = document.getElementById('mixTrack').value;
  const db = document.getElementById('mixDb').value;
  setLoading('mixBtn', true);
  try {
    const r = await fetch(`${API}/mix/${track}?vocal_volume_db=${db}`, {method: 'POST'});
    const d = await r.json();
    if (d.status === 'success') {
      toast('Mix Complete', `${d.vocal_clips_mixed} clips mixed at ${db} dB · ${d.size_mb} MB`);
    } else {
      toast('Mix Failed', d.error || 'Unknown error', true);
    }
  } catch(e) {
    toast('Error', e.message, true);
  } finally {
    setLoading('mixBtn', false);
  }
}

async function openTrack(slug) {
  try {
    await fetch(`${API}/open/${slug}`, {method: 'POST'});
    toast('Opened', 'Track launched in default audio player');
  } catch(e) {
    toast('Error', e.message, true);
  }
}

// ── Helpers ─────────────────────────────────────────────────────
function setLoading(id, on) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

function toast(title, msg, err=false) {
  const t = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'show ' + (err ? 'err' : 'ok');
  setTimeout(() => t.className = '', 4000);
}

// ── Start ───────────────────────────────────────────────────────
init().catch(e => console.error('Talon Studio init failed:', e));
</script>
</body>
</html>
