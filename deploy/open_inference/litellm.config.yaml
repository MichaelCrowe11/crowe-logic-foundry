general_settings:
  master_key: os.environ/CROWE_OPEN_PROXY_MASTER_KEY
  disable_spend_logs: true
  background_health_checks: true

model_list:
  - model_name: z-ai/glm5.1
    litellm_params:
      model: openai/z-ai/glm5.1
      api_base: os.environ/CROWE_GLM51_API_BASE
      api_key: os.environ/CROWE_GLM51_API_KEY

  - model_name: z-ai/glm5
    litellm_params:
      model: openai/z-ai/glm5
