  ollama-dev:
    image: ollama/ollama:latest
    container_name: crowe-open-ollama-dev
    restart: unless-stopped
    profiles: ["ollama-dev"]
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
    networks:
      - crowe-open
    volumes:
      - ${CROWE_OPEN_OLLAMA_DIR:-./data/ollama}:/root/.ollama

networks:
  crowe-open:
    driver: bridge
