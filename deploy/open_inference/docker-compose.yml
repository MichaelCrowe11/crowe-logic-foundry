  llama4-maverick:
    <<: *vllm-common
    container_name: crowe-open-llama4-maverick
    profiles: ["llama4-maverick"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--model"
      - "${LLAMA4_MAVERICK_MODEL_ID:-meta-llama/Llama-4-Maverick-17B-128E-Instruct}"
      - "--served-model-name"
      - "${LLAMA4_MAVERICK_SERVED_MODEL_NAME:-meta/llama-4-maverick-17b-128e-instruct}"
      - "--trust-remote-code"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-32768}"
      - "--tensor-parallel-size"
      - "${LLAMA4_MAVERICK_TENSOR_PARALLEL_SIZE:-2}"
      - "--gpu-memory-utilization"
