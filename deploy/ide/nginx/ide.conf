# deploy/ide/nginx/ide.conf
# Reverse proxy for ide.southwestmushrooms.com -> Session Router.
#
# Ships HTTP-only so `nginx -t` passes on first install. After enabling
# this site, run `certbot --nginx -d ide.southwestmushrooms.com` — the
# certbot --nginx plugin will rewrite this file in place to add the 443
# server block, cert paths, and HTTP->HTTPS redirect.
#
# DO NOT add a `listen 443 ssl` block here without real cert paths;
# `nginx -t` will reject the config and the reload will silently fail,
# leaving the default site (welcome page) responding instead.

server {
    listen 80;
    server_name ide.southwestmushrooms.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support (critical for code-server)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for streaming
        proxy_buffering off;
    }
}
