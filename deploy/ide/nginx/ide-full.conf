# deploy/ide/nginx/ide-full.conf
#
# Full Nginx config for ide.southwestmushrooms.com.
# Routes: IDE sessions → session-router, API → control-plane,
# with WebSocket upgrade support and Let's Encrypt cert paths.
#
# For first deploy (HTTP only), comment out the ssl_certificate lines
# and the 443 server block. Run certbot to issue certs, then uncomment.

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# Upstream definitions
upstream session_router {
    server session-router:3001;
    keepalive 64;
}

upstream control_plane {
    server control-plane:8001;
    keepalive 32;
}

# ── HTTP server (redirect to HTTPS + certbot challenge) ─────────────
server {
    listen 80;
    server_name ide.southwestmushrooms.com;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Nginx health check (used by docker healthcheck)
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ide.southwestmushrooms.com;

    # TLS certs — managed by certbot. Comment out for first deploy.
    ssl_certificate     /etc/letsencrypt/live/ide.southwestmushrooms.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ide.southwestmushrooms.com/privkey.pem;

    # Modern TLS config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Nginx health
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── Control Plane API (/api/*) ──────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://control_plane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Stripe webhooks (no rate limit — Stripe retries) ────────────
    location = /api/billing/webhook {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://control_plane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # Stripe sends raw body; preserve it
        proxy_set_header Content-Type $content_type;
    }

    # ── API docs (Swagger UI) ──────────────────────────────────────
    location /docs {
        proxy_pass http://control_plane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://control_plane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── IDE sessions (everything else → session router) ─────────────
    location / {
        proxy_pass http://session_router;
        proxy_http_version 1.1;

        # WebSocket support (critical for code-server terminal + LSP)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for WebSocket connections (1 hour)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for streaming
        proxy_buffering off;

        # Large body support for file uploads
        client_max_body_size 100m;
    }
}
