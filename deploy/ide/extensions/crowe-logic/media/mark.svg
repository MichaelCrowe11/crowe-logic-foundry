<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Crowe Logic activity-bar glyph.
       A confident partial-ring (the C) with an inset forward-chevron
       (logic / progression). Uses currentColor so VS Code tints it with
       the active icon theme token, matching built-in codicons at 16 and
       24 px. Stroke width tuned for crispness at 16 px on a 24-unit grid. -->
  <!-- Outer C, open on the right, golden-ratio arc length. -->
  <path d="M17.25 6.25A7.75 7.75 0 1 0 17.25 17.75"/>
  <!-- Logic chevron pointing forward, centered in the open gap. -->
  <path d="M10.75 9.25 14 12 10.75 14.75"/>
</svg>
