# deploy/ide/docker-compose.yml
# Defines the base code-server image build and the admin container.
# Subscriber containers are created dynamically by the Session Router.

services:
  admin:
    # Tag the built image as crowe-ide-codeserver so the Session Router
    # (which uses IMAGE_NAME=crowe-ide-codeserver from .env) can spawn
    # subscriber containers from the same image. Without this, compose
    # auto-names it "<project>-admin" and the router fails with
    # "no such image" the first time a real user requests a session.
    image: crowe-ide-codeserver:latest
    build:
      context: .
      dockerfile: Dockerfile.code-server
    container_name: crowe-ide-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:10000:8080"
    volumes:
      - /opt/crowe-logic-foundry:/workspace/crowe-logic-foundry
      - admin-data:/home/coder/.local
    environment:
      - DOCKER_USER=coder
    command:
      - --bind-addr=0.0.0.0:8080
      - --auth=none
      - --disable-telemetry
    cpus: 2.0
    mem_limit: 2g
    networks:
      - ide-admin
    # code-server returns 302 to /login at the root when reachable. wget --spider
    # follows redirects and exits 0 on any 2xx/3xx response, which is exactly
    # what we want — "the HTTP server answered."
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  ide-admin:
    driver: bridge
  ide-subscribers:
    driver: bridge
    internal: true  # No external network access for subscriber containers

volumes:
  admin-data:
