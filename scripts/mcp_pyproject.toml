[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crowe-logic-mcp"
version = "1.0.0"
description = "MCP server for Crowe Logic — mycology expertise, photo analysis, grow logs, and SOP generation"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{name = "Michael Crowe", email = "michael@crowelogic.com"}]
keywords = ["mcp", "mycology", "mushroom", "cultivation", "ai", "agriculture"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]
dependencies = [
    "mcp[cli]>=1.0.0",
    "httpx>=0.28.0",
]

[project.scripts]
crowe-logic-mcp = "scripts.mcp_crowe_logic_ai:main"

[project.urls]
Repository = "https://github.com/MichaelCrowe11/crowe-logic-foundry"
