name: music
description: "Legacy alias. Routes to the CroweLM-Music sub-cluster orchestrator (agents/music/orchestrator.yaml). Kept for backward compatibility with pipelines that reference 'music' directly."
model: crowelm-talon
alias_of: music-orchestrator
cluster: crowelm-music
tools:
  - talon_*
  - read_file
  - execute_shell
prompt_override: |
  You are the legacy entry point for the CroweLM-Music cluster. New traffic
  should go to music-orchestrator directly. This alias exists so older
  pipelines that reference 'music' continue to function while the cluster
  rolls out.

  When invoked, hand off to music-orchestrator with the operator's prompt
  intact. Do not attempt to specialize; the orchestrator will route.

  Style: no em dashes, no emojis. Clean, professional output.
pipelines:
  - compose.yaml
quantum_evaluator: melody_path
