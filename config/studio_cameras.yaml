#
# Studio Cameras — declarative registry of capture sources, each with a
# role, defaults, and an ingest adapter. Add new cameras here and the
# studio agent can pick them for multi-angle shoots without code changes.
#
# Schema per camera:
#   name:         unique identifier (snake-case)
#   role:         semantic angle role — "wide", "close", "product",
#                 "overhead", "reaction", "broll", "screen"
#   source_type:  "avfoundation" (local), "ndi" (network stream),
#                 "rtsp" (IP camera), "file_drop" (remote iPhone syncs
#                 to a folder), "cloud" (cloud container streams back)
#   source:       the concrete source. For avfoundation: device name
#                 substring. For file_drop: watched directory. For
#                 ndi/rtsp/cloud: URL.
#   default_specs:
#     width, height, framerate, video_bitrate, pixel_format
#   sync_priority: "primary" cameras provide the master audio track the
#                 other cameras align to during render. Only one per shoot.
#   notes:        agent-facing description.

cameras:

  - name: iphone-wide
    role: wide
    source_type: avfoundation
    source: "iphone"                           # auto-resolves via find_iphone_device
    default_specs:
      width: 1920
      height: 1080
      framerate: 30
      video_bitrate: 10M
      pixel_format: uyvy422
    sync_priority: primary
    notes: >-
      Default talking-head wide shot via iPhone Continuity Camera. Captures
      audio; serves as master audio track for multi-angle alignment.

  - name: macbook-close
    role: close
    source_type: avfoundation
    source: "MacBook Air Camera"
    default_specs:
      width: 1280
      height: 720
      framerate: 30
      video_bitrate: 6M
    sync_priority: secondary
    notes: >-
      MacBook built-in camera as close-up / reaction angle. Lower quality
      than iPhone but always available, and the laptop is typically closer
      to the user's face during seated presentation.

  - name: screen
    role: screen
    source_type: avfoundation
    source: "Capture screen 0"
    default_specs:
      width: 1920
      height: 1080
      framerate: 30
      video_bitrate: 12M
    sync_priority: secondary
    notes: >-
      Full-display screen recording. Useful for tutorials, dashboards in
      action, or picture-in-picture overlays with the wide shot.

