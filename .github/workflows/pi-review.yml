name: Pi Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**.py"
      - "**.ts"
      - "**.js"
      - "**.yaml"
      - "**.yml"
      - "**.md"

jobs:
  pi-review:
    name: Pi AI Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pi
        run: npm install -g @mariozechner/pi-coding-agent

      - name: Run pi-enhanced build (review)
        id: build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/pi-build.mjs ci > pi-review.json || true
          cat pi-review.json

      - name: Parse review result
        id: parse
        if: always()
        run: |
          if [ -f pi-review.json ]; then
            OK=$(jq -r '.ok // false' pi-review.json)
            VERDICT=$(jq -r '.stages[] | select(.stage=="review") | .verdict // "UNKNOWN"' pi-review.json)
            echo "ok=$OK" >> "$GITHUB_OUTPUT"
            echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "verdict=ERROR" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment PR with review summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ steps.parse.outputs.ok }}' === 'true';
            const verdict = '${{ steps.parse.outputs.verdict }}';
            const body = `## 🤖 Pi Code Review

            **Verdict:** ${verdict} ${ok ? '✅' : '⚠️'}

            ${ok
              ? 'AI review passed. No blocking issues detected.'
              : 'AI review flagged issues. Please review the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'}

            _Powered by [pi](https://pi.dev)_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail on blocking review
        if: steps.parse.outputs.ok != 'true'
        run: |
          echo "Blocking review verdict: ${{ steps.parse.outputs.verdict }}"
          exit 1
