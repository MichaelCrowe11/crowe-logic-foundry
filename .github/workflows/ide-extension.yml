# .github/workflows/ide-extension.yml
name: IDE Extension CI

on:
  push:
    paths:
      - 'deploy/ide/extensions/crowe-logic/**'
  pull_request:
    paths:
      - 'deploy/ide/extensions/crowe-logic/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: deploy/ide/extensions/crowe-logic

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Compile TypeScript
        run: npx tsc -p ./ --noEmit

      - name: Package extension
        run: npx vsce package --no-dependencies --out crowe-logic.vsix

      - name: Verify package
        run: |
          ls -la crowe-logic.vsix
          echo "Extension built successfully"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crowe-logic-vsix
          path: deploy/ide/extensions/crowe-logic/crowe-logic.vsix
          retention-days: 30
